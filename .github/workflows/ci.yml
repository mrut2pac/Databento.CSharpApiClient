name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Databento.CSharpApiClient.slnx

      - name: Build (Debug)
        run: dotnet build Databento.CSharpApiClient.slnx -c Debug --no-restore --nologo

      - name: Build (Release)
        run: dotnet build Databento.CSharpApiClient.slnx -c Release --no-restore --nologo

      - name: Unit tests
        run: |
          dotnet test tests/Databento.CSharpApiClient.UnitTests/Databento.CSharpApiClient.UnitTests.csproj \
            -c Debug --no-build --no-restore --nologo \
            --logger "console;verbosity=normal"

      - name: Verify pack
        run: |
          dotnet pack src/Databento.CSharpApiClient/Databento.CSharpApiClient.csproj \
            -c Release --no-build --no-restore --nologo -o ./nupkg
          echo "Produced:" && ls ./nupkg
