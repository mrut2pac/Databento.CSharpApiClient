name: Publish to NuGet.org

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 1.0.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC / Trusted Publishing

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore src/Databento.CSharpApiClient/Databento.CSharpApiClient.csproj

      - name: Build
        run: |
          dotnet build src/Databento.CSharpApiClient/Databento.CSharpApiClient.csproj \
            -c Release --no-restore \
            -p:Version=${{ steps.version.outputs.value }}

      - name: Pack
        run: |
          dotnet pack src/Databento.CSharpApiClient/Databento.CSharpApiClient.csproj \
            -c Release --no-build \
            -p:Version=${{ steps.version.outputs.value }} \
            -o nupkg

      - name: Get OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api://AzureADTokenExchange')
            core.setSecret(token)
            core.setOutput('token', token)

      - name: Publish to NuGet.org (Trusted Publishing)
        run: |
          RESPONSE=$(curl -sSL -X POST \
            https://www.nuget.org/api/v1/api-key/oidc \
            -H 'Content-Type: application/json' \
            -d "{\"oidcToken\": \"${{ steps.oidc.outputs.token }}\"}")
          NUGET_KEY=$(echo "$RESPONSE" | jq -r '.apiKey // .result // empty')
          if [ -z "$NUGET_KEY" ]; then
            echo "Exchange failed. Response: $RESPONSE"
            exit 1
          fi
          dotnet nuget push nupkg/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_KEY" \
            --skip-duplicate
