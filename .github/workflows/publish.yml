name: Publish to NuGet.org

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 1.0.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC / Trusted Publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore src/Databento.CSharpApiClient/Databento.CSharpApiClient.csproj

      - name: Build
        run: |
          dotnet build src/Databento.CSharpApiClient/Databento.CSharpApiClient.csproj \
            -c Release --no-restore \
            -p:Version=${{ steps.version.outputs.value }}

      - name: Pack
        run: |
          dotnet pack src/Databento.CSharpApiClient/Databento.CSharpApiClient.csproj \
            -c Release --no-build \
            -p:Version=${{ steps.version.outputs.value }} \
            -o nupkg

      - name: Publish to NuGet.org (Trusted Publishing)
        run: |
          OIDC_TOKEN=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | jq -r '.value')
          NUGET_KEY=$(curl -sSL -X POST \
            https://api.nuget.org/v1/api-key/exchange-using-trusted-publisher \
            -H 'Content-Type: application/json' \
            -d "{\"oidcToken\": \"${OIDC_TOKEN}\"}" \
            | jq -r '.apiKey')
          dotnet nuget push nupkg/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_KEY" \
            --skip-duplicate
